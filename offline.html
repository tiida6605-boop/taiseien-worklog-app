<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(株)大成園　作業記録アプリ（オフライン）</title>
  <meta name="theme-color" content="#516c3d">
  <style>
    :root {
      --bg: #f4efe5;
      --text: #2e2419;
      --muted: #6f5f4d;
      --leaf: #516c3d;
      --paper: #fffaf1;
      --line: rgba(96, 68, 38, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: "Zen Kaku Gothic New", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(227, 167, 47, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(81, 108, 61, 0.2), transparent 28%),
        linear-gradient(180deg, #f8f1e5 0%, #efe5d5 100%);
    }

    .offline-card {
      width: min(100%, 460px);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 1.15rem 1rem;
      box-shadow: 0 14px 36px rgba(71, 47, 22, 0.12);
      display: grid;
      gap: 0.75rem;
    }

    .offline-card__title {
      margin: 0;
      font-size: 1.1rem;
      color: var(--leaf);
    }

    .offline-card__lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 0.95rem;
    }

    .offline-card__actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      min-height: 44px;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    .button--primary {
      background: var(--leaf);
      color: #fff;
    }

    .button--ghost {
      background: #efe8db;
      color: #4e4034;
    }

    @media (max-width: 520px) {
      .offline-card__actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="offline-card" aria-live="polite">
    <h1 class="offline-card__title">(株)大成園　作業記録アプリ</h1>
    <p class="offline-card__lead">
      現在オフラインです。通信が戻ると最新データの取得や同期ができます。<br>
      保存済みの画面は引き続き利用できます。
    </p>
    <div class="offline-card__actions">
      <button type="button" class="button--primary" onclick="location.reload()">再読み込み</button>
      <button type="button" class="button--ghost" onclick="location.href='./index.html'">アプリへ戻る</button>
    </div>
  </section>
</body>
</html>
